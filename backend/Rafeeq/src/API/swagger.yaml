  '/api/admins/cities/{id}':
    get:
      tags:
        - AdminCities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/CityAdminDetailDto'
            application/json:
              schema:
                $ref: '#/components/schemas/CityAdminDetailDto'
            text/json:
              schema:
