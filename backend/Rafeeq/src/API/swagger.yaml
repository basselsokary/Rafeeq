openapi: 3.0.1
info:
  title: Rafeeq API
  version: v1
paths:
  '/api/admins/sponsors/{id}':
    get:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AdminSponsorDetailDto'
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSponsorDetailDto'
            text/json:
              schema:
                $ref: '#/components/schemas/AdminSponsorDetailDto'
    put:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSponsorRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/UpdateSponsorRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/UpdateSponsorRequest'
      responses:
        '200':
          description: OK
    delete:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    patch:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateSponsorRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/ActivateSponsorRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ActivateSponsorRequest'
      responses:
        '200':
          description: OK
  /api/admins/sponsors:
    post:
      tags:
        - AdminSponsors
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSponsorRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateSponsorRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateSponsorRequest'
      responses:
        '200':
          description: OK
  '/api/admins/sponsors/{id}/set-main-image':
    patch:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: imageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/admins/sponsors/{id}/images':
    get:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageDto'
    post:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                Images:
                  type: array
                  items:
                    $ref: '#/components/schemas/AddSponsorImageItem'
            encoding:
              Images:
                style: form
      responses:
        '200':
          description: OK
    delete:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: imageIds
          in: path
          required: true
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        '200':
          description: OK
  '/api/admins/sponsors/{id}/images/{imageId}':
    get:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: imageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ImageDto'
            application/json:
              schema:
                $ref: '#/components/schemas/ImageDto'
            text/json:
              schema:
                $ref: '#/components/schemas/ImageDto'
  '/api/admins/sponsors/{id}/offers':
    get:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SponsorOfferDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SponsorOfferDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SponsorOfferDto'
    post:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSponsorOfferRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/AddSponsorOfferRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/AddSponsorOfferRequest'
      responses:
        '200':
          description: OK
  '/api/admins/sponsors/offers/{offerId}':
    get:
      tags:
        - AdminSponsors
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/SponsorOfferDto'
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorOfferDto'
            text/json:
              schema:
                $ref: '#/components/schemas/SponsorOfferDto'
  '/api/admins/sponsors/{id}/offers/{offerId}':
    put:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSponsorOfferRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/UpdateSponsorOfferRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/UpdateSponsorOfferRequest'
      responses:
        '200':
          description: OK
    delete:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/admins/sponsors/{id}/localized-contents':
    get:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminSponsorLocalizedContentDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminSponsorLocalizedContentDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminSponsorLocalizedContentDto'
    post:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AddSponsorLocalizedContentsDtoCommand'
          text/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AddSponsorLocalizedContentsDtoCommand'
          application/*+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AddSponsorLocalizedContentsDtoCommand'
      responses:
        '200':
          description: OK
    put:
      tags:
        - AdminSponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateSponsorLocalizedContentsDto'
          text/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateSponsorLocalizedContentsDto'
          application/*+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateSponsorLocalizedContentsDto'
      responses:
        '200':
          description: OK
  /api/admins/sponsors/dashboard:
    get:
      tags:
        - AdminSponsors
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AdminSponsorDashboardDto'
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSponsorDashboardDto'
            text/json:
              schema:
                $ref: '#/components/schemas/AdminSponsorDashboardDto'
  /api/sponsors:
    get:
      tags:
        - Sponsors
      parameters:
        - name: searchTerm
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/SponsorType'
        - name: tier
          in: query
          schema:
            $ref: '#/components/schemas/SponsorTier'
        - name: activeOnly
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
            default: 20
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/SponsorListDtoPagedResult'
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorListDtoPagedResult'
            text/json:
              schema:
                $ref: '#/components/schemas/SponsorListDtoPagedResult'
  '/api/sponsors/{id}':
    get:
      tags:
        - Sponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/SponsorDetailDto'
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorDetailDto'
            text/json:
              schema:
                $ref: '#/components/schemas/SponsorDetailDto'
  /api/sponsors/nearby:
    get:
      tags:
        - Sponsors
      parameters:
        - name: latitude
          in: query
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          schema:
            type: number
            format: double
        - name: radiusKm
          in: query
          schema:
            type: integer
            format: int32
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/SponsorType'
        - name: tier
          in: query
          schema:
            $ref: '#/components/schemas/SponsorTier'
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NearbySponsorDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NearbySponsorDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NearbySponsorDto'
  '/api/sponsors/{id}/offers':
    get:
      tags:
        - Sponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SponsorOfferDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SponsorOfferDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SponsorOfferDto'
  /api/sponsors/offers:
    get:
      tags:
        - Sponsors
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/SponsorType'
        - name: tier
          in: query
          schema:
            $ref: '#/components/schemas/SponsorTier'
        - name: sponsorActiveOnly
          in: query
          schema:
            type: boolean
        - name: activeOnly
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
            default: 20
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/SponsorOfferListDtoPagedResult'
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorOfferListDtoPagedResult'
            text/json:
              schema:
                $ref: '#/components/schemas/SponsorOfferListDtoPagedResult'
  '/api/sponsors/offers/{offerId}':
    get:
      tags:
        - Sponsors
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/SponsorOfferDto'
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorOfferDto'
            text/json:
              schema:
                $ref: '#/components/schemas/SponsorOfferDto'
  '/api/sponsors/{id}/offers/{offerId}/redeem':
    put:
      tags:
        - Sponsors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
components:
  schemas:
    ActivateSponsorRequest:
      type: object
      properties:
        activate:
          type: boolean
      additionalProperties: false
    AddOfferLocalizedContentDto:
      type: object
      properties:
        language:
          $ref: '#/components/schemas/LanguageCode'
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        termsAndConditions:
          type: string
          nullable: true
      additionalProperties: false
    AddSponsorImageItem:
      type: object
      properties:
        image:
          type: string
          format: binary
          nullable: true
        isMain:
          type: boolean
        displayOrder:
          type: integer
          format: int32
        caption:
          type: string
          nullable: true
      additionalProperties: false
    AddSponsorLocalizedContentsDtoCommand:
      type: object
      properties:
        language:
          $ref: '#/components/schemas/LanguageCode'
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
      additionalProperties: false
    AddSponsorOfferRequest:
      type: object
      properties:
        discountAmount:
          type: number
          format: double
          nullable: true
        discountPercentage:
          type: integer
          format: int32
          nullable: true
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        maxRedemptions:
          type: integer
          format: int32
          nullable: true
        promoCode:
          type: string
          nullable: true
        localizedContents:
          type: array
          items:
            $ref: '#/components/schemas/AddOfferLocalizedContentDto'
          nullable: true
      additionalProperties: false
    AdminSponsorDashboardDto:
      type: object
      properties:
        totalSponsors:
          type: integer
          format: int32
        activeSponsors:
          type: integer
          format: int32
        expiredSponsors:
          type: integer
          format: int32
        totalOffers:
          type: integer
          format: int32
        activeOffers:
          type: integer
          format: int32
      additionalProperties: false
    AdminSponsorDetailDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/SponsorType'
        tier:
          $ref: '#/components/schemas/SponsorTier'
        location:
          $ref: '#/components/schemas/LocationDto'
        address:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        dateRange:
          $ref: '#/components/schemas/DateRangeDto'
        isContractValid:
          type: boolean
        status:
          $ref: '#/components/schemas/SponsorStatus'
        totalRedemptions:
          type: integer
          format: int32
        distanceKm:
          type: number
          format: double
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
        createdByName:
          type: string
          nullable: true
        lastModifiedAt:
          type: string
          format: date-time
          nullable: true
        lastModifiedBy:
          type: string
          format: uuid
          nullable: true
        lastModifiedByName:
          type: string
          nullable: true
      additionalProperties: false
    AdminSponsorLocalizedContentDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        language:
          $ref: '#/components/schemas/LanguageCode'
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        auditInfo:
          $ref: '#/components/schemas/AuditInfoDto'
      additionalProperties: false
    AuditInfoDto:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
        createdByName:
          type: string
          nullable: true
        lastModifiedAt:
          type: string
          format: date-time
          nullable: true
        lastModifiedBy:
          type: string
          format: uuid
          nullable: true
        lastModifiedByName:
          type: string
          nullable: true
      additionalProperties: false
    CreateSponsorRequest:
      type: object
      properties:
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/SponsorType'
        tier:
          $ref: '#/components/schemas/SponsorTier'
        location:
          $ref: '#/components/schemas/LocationRequest'
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        websiteUrl:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
      additionalProperties: false
    DateRangeDto:
      type: object
      properties:
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        durationInDays:
          type: integer
          format: int32
      additionalProperties: false
    ImageDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        storageKey:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        isMain:
          type: boolean
        displayOrder:
          type: integer
          format: int32
      additionalProperties: false
    LanguageCode:
      enum:
        - arabic
        - english
        - german
        - russian
        - french
        - spanish
      type: string
    LocationDto:
      type: object
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
      additionalProperties: false
    LocationRequest:
      type: object
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
      additionalProperties: false
    MoneyDto:
      type: object
      properties:
        amount:
          type: number
          format: double
        currency:
          type: string
          nullable: true
        formattedAmount:
          type: string
          nullable: true
      additionalProperties: false
    NearbySponsorDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/SponsorType'
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        distanceKm:
          type: number
          format: double
        primaryImageUrl:
          type: string
          nullable: true
        averageRating:
          type: number
          format: double
        hasActiveOffers:
          type: boolean
        activeOffersCount:
          type: integer
          format: int32
        typeDisplay:
          type: string
          nullable: true
      additionalProperties: false
    SponsorDetailDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/SponsorType'
        location:
          $ref: '#/components/schemas/LocationDto'
        address:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        averageRating:
          type: number
          format: double
        totalReviews:
          type: integer
          format: int32
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageDto'
          nullable: true
        activeOffers:
          type: array
          items:
            $ref: '#/components/schemas/SponsorOfferDto'
          nullable: true
        dateRange:
          $ref: '#/components/schemas/DateRangeDto'
        isContractValid:
          type: boolean
        status:
          $ref: '#/components/schemas/SponsorStatus'
        totalClicks:
