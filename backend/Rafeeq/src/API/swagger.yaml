    put:
      tags:
        - AdminCities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                CenterLocation.Latitude:
                  type: number
                  format: double
                CenterLocation.Longitude:
                  type: number
                  format: double
                DisplayOrder:
                  type: integer
                  format: int32
                Image:
                  type: string
                  format: binary
            encoding:
              CenterLocation.Latitude:
                style: form
              CenterLocation.Longitude:
                style: form
              DisplayOrder:
                style: form
              Image:
                style: form
      responses:
        '200':
          description: OK
    delete:
