components:
  schemas:
    AddSiteImageItem:
      type: object
      properties:
        file:
          type: string
          format: binary
          nullable: true
        isMain:
          type: boolean
        displayOrder:
          type: integer
          format: int32
        caption:
          type: string
          nullable: true
      additionalProperties: false
    AddSiteLocalizedContentsDtoCommand:
      type: object
      properties:
        language:
          $ref: '#/components/schemas/LanguageCode'
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        street:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
      additionalProperties: false
    AddSiteNearestTransportationRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/TransportationType'
        location:
          $ref: '#/components/schemas/LocationRequest'
        distanceKm:
          type: number
          format: double
        address:
          $ref: '#/components/schemas/AddressRequest'
      additionalProperties: false
    AddSiteOpeningHoursDtoCommand:
      type: object
      properties:
        dayOfWeek:
          $ref: '#/components/schemas/WeekDay'
        openingTime:
